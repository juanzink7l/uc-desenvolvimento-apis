<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatos Aleatórios</title>
    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            text-align: center;
            background-color: rgb(116, 112, 112);
            margin-top: 50px;
        }
        h1 {
            color: rgb(53, 248, 248);
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            background-color: #3649f0;
            color: black;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px;
        }
        button:hover{
            background-color: blue;
        }
        #imagem {
            max-width: 500px;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <h1> 🐈Galeria de Gatos</h1>
    <p>Clique no botão para ver um miau aleatório!</p>
    <button id="botao">Clique aqui🎲</button>
    <br>
    <img id="imagem" src="" width="400" style="display: none;">
    <script>
        const botao = document.getElementById('botao');
        const imagem = document.getElementById('imagem');

        botao.addEventListener('click', function() {
            console.log('Botão clicado! Vamos buscar um miau...')
            fetch('https://api.thecatapi.com/v1/images/search') /* quando quiser usar API em java script pro front end usa se o fetch */

                .then(function(resposta){
                    console.log('Resposta HTTP Recebida"');
                    console.log('Status Code:', resposta.status); /* 200 */
                    console.log('Headers:', resposta.headers);
                    return resposta.json();
                })

                .then(function(dados){
                    console.log('Dados extraídos (JSON - Objeto JS):', dados);
                    
                    const urlDoGato = dados[0].url;
                    console.log('URL da Imagem;', urlDoGato);

                    imagem.src = urlDoGato;
                    imagem.style.display = 'block';

                    console.log('Imagem carregada com sucesso!') /* console log é o que aparece la no f12 do google */
                });
            });
    </script>
</body>
</html>
